name: Stage 4 preview activation patch

on:
  push:
    branches:
      - wishlist/stage-4-manual-image-modes

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: wishlist/stage-4-manual-image-modes
          fetch-depth: 0

      - name: Add accessible preview activation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/features/wishlist/WishFormModal.tsx')
          source = path.read_text()
          old = """                    persistenceEnabled={canPersistPreview}
                    onProcessingChange={canPersistPreview ? handleImageProcessingChange : undefined}
          """
          new = """                    persistenceEnabled={canPersistPreview}
                    onActivate={() => onPhotoClick(previewSrc)}
                    onProcessingChange={canPersistPreview ? handleImageProcessingChange : undefined}
          """
          if source.count(old) != 1:
              raise SystemExit('preview activation anchor was not unique')
          path.write_text(source.replace(old, new, 1))
          PY

      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/stage4-preview-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/wishlist/WishFormModal.tsx .github/workflows/stage4-preview-patch.yml
          git commit -m "fix(wishlist): restore preview lightbox activation"
          git push origin HEAD:wishlist/stage-4-manual-image-modes
