name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - wishlist-v3-foundation
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 1

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build
