<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Наша історія ❤️</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:#141420;font-family:'Courier New',ui-monospace,Menlo,monospace;-webkit-user-select:none;user-select:none;touch-action:none}
#cv{position:fixed;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none}
#hud{position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:#101326e6;color:#ffe9a8;border:2px solid #f7c94b;border-radius:12px;padding:7px 14px;font-weight:700;font-size:14px;max-width:92vw;text-align:center;z-index:5;box-shadow:0 3px 0 #0007;display:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mute{position:fixed;top:calc(10px + env(safe-area-inset-top));right:10px;z-index:6;background:#101326e6;border:2px solid #8892c9;color:#dfe3ff;border-radius:10px;width:38px;height:38px;font-size:17px;display:none;align-items:center;justify-content:center;cursor:pointer}
#dialog{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(16px + env(safe-area-inset-bottom));width:min(560px,94vw);background:#101326f5;border:3px solid #e9e2cf;border-radius:10px;padding:12px 14px 8px;color:#fff;z-index:8;display:none;box-shadow:0 4px 0 #0009}
#dwho{font-size:13px;margin-bottom:4px;font-weight:700;letter-spacing:1px}
#dtext{font-size:16px;line-height:1.45;min-height:46px;white-space:pre-wrap}
#dnext{text-align:right;color:#f7c94b;animation:bl .9s infinite;font-size:14px}
@keyframes bl{50%{opacity:.15}}
#card{position:fixed;left:50%;top:40%;transform:translate(-50%,-50%) scale(.8);background:#101326f2;border:3px solid #f7c94b;color:#ffe9a8;padding:16px 24px;border-radius:14px;font-size:20px;font-weight:800;text-align:center;z-index:9;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;max-width:90vw;line-height:1.35;box-shadow:0 5px 0 #0008}
#card.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(8px);bottom:calc(120px + env(safe-area-inset-bottom));background:#101326e8;border:2px solid #8892c9;color:#dfe3ff;padding:8px 14px;border-radius:10px;font-size:14px;font-weight:700;z-index:7;opacity:0;transition:all .2s;pointer-events:none;max-width:88vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#fader{position:fixed;inset:0;background:#000;opacity:1;transition:opacity .32s;pointer-events:none;z-index:6}
#stickBase{position:fixed;width:98px;height:98px;border:2px solid #ffffff44;background:#ffffff14;border-radius:50%;z-index:5;display:none;pointer-events:none}
#stickKnob{position:absolute;left:50%;top:50%;width:44px;height:44px;margin:-22px 0 0 -22px;background:#ffffff55;border:2px solid #ffffff88;border-radius:50%}
.overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px}
#title{background:linear-gradient(180deg,#1b2040 0%,#141428 55%,#251530 100%)}
#title h1{margin:0;font-size:clamp(38px,11vw,64px);letter-spacing:5px;color:#ffe9a8;text-shadow:3px 3px 0 #c2494f,6px 6px 0 #101326;line-height:1.05}
#title .sub{margin:2px 0 8px;color:#9aa3d8;font-weight:700;font-size:15px;letter-spacing:1px}
#title .foot{margin-top:16px;color:#c9a0b8;font-size:14px;font-weight:700}
.fh{position:absolute;font-size:22px;animation:fl linear infinite;opacity:.5;pointer-events:none}
@keyframes fl{from{transform:translateY(105vh)}to{transform:translateY(-12vh)}}
.btn{background:#f7c94b;border:0;border-radius:12px;padding:14px 24px;font:inherit;font-weight:800;font-size:18px;color:#3a2b00;box-shadow:0 5px 0 #b98f1d;cursor:pointer;letter-spacing:1px}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #b98f1d}
.btn.pink{background:#ff5d8f;color:#fff;box-shadow:0 5px 0 #c23a67}
.btn.pink:active{box-shadow:0 1px 0 #c23a67}
#ask{background:#160a18cc;backdrop-filter:blur(2px);display:none}
#ask .qbox{background:#101326f5;border:3px solid #ff5d8f;border-radius:16px;padding:26px 22px;max-width:92vw;box-shadow:0 6px 0 #0009}
#qt{color:#ffd9e6;font-size:clamp(20px,6vw,28px);font-weight:800;margin-bottom:22px;line-height:1.35}
#ask .qbtns{display:flex;flex-direction:column;gap:14px}
#final{background:linear-gradient(180deg,#2a1535 0%,#141428 60%,#1b2040 100%);display:none}
#final h1{margin:0;font-size:clamp(26px,8vw,44px);color:#ffd9e6;text-shadow:3px 3px 0 #c23a67,6px 6px 0 #101326;line-height:1.25}
#final .route{color:#9aa3d8;font-weight:700;font-size:13px;letter-spacing:1px;line-height:1.6}
#final .date{color:#ffe9a8;font-weight:800;font-size:18px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud"></div>
<div id="mute">🔊</div>
<div id="dialog"><div id="dwho"></div><div id="dtext"></div><div id="dnext">▼ далі</div></div>
<div id="card"></div>
<div id="toast"></div>
<div id="stickBase"><div id="stickKnob"></div></div>

<div id="title" class="overlay">
  <span class="fh" style="left:8%;animation-duration:9s">💛</span>
  <span class="fh" style="left:24%;animation-duration:13s;animation-delay:-4s">❤️</span>
  <span class="fh" style="left:55%;animation-duration:11s;animation-delay:-7s">💛</span>
  <span class="fh" style="left:76%;animation-duration:14s;animation-delay:-2s">❤️</span>
  <span class="fh" style="left:90%;animation-duration:10s;animation-delay:-6s">💗</span>
  <h1>НАША<br>ІСТОРІЯ</h1>
  <p class="sub">Жилинці → Вінниця → Одеса</p>
  <button class="btn" id="startBtn">▶ ПОЧАТИ</button>
  <p class="foot">для Лєни · з любов'ю, Діма ❤️</p>
</div>

<div id="ask" class="overlay">
  <div class="qbox">
    <div id="qt"></div>
    <div class="qbtns">
      <button id="yes1" class="btn pink"></button>
      <button id="yes2" class="btn"></button>
    </div>
  </div>
</div>

<div id="final" class="overlay">
  <h1 id="finTitle">ПОЧАТОК НОВОЇ ГЛАВИ ❤️</h1>
  <p class="date" id="finDate"></p>
  <p class="route">Жилинці → Хмельницький → Правдівка →<br>Вінниця (ВТЕІ · Вишенька · вокзал) → Одеса</p>
  <button class="btn" onclick="location.reload()">↻ ГРАТИ СПОЧАТКУ</button>
</div>

<div id="fader"></div>

<script>
'use strict';
/* ============================================================
   НАША ІСТОРІЯ — піксельний лайф-сим для Лєни ❤️
   Все, що захочеш підредагувати (імена, кольори, слова
   при знайомстві та освідченні) — у блоці CFG нижче.
   ============================================================ */
const CFG = {
  her: 'Лєна',
  him: 'Діма',
  colors: {
    skin:       '#f2c9a0',
    herHair:    '#9c7a45',   // русяве волосся Лєни
    herTop:     '#5aa7e0',   // блакитний верх Лєни
    herSkirt:   '#f4f4f7',   // білий низ Лєни
    herDressKid:'#f2a5c0',   // сукня маленької Лєни
    himHair:    '#8f6d3e',   // русяве волосся Діми
    himShirt:   '#6e4a2a',   // коричневий верх Діми
    himPants:   '#3f7a3a',   // зелений низ Діми
    himEyes:    '#4a90d9',   // блакитні очі Діми
  },
  meet: [
    ['n','Четвертий курс. І раптом — повідомлення в дайвінчику…'],
    ['d','Класна ава, Лєна!'],
    ['l','У тебе також класна ава!'],
    ['d','Давай зустрічатись через дайвінчик.'],
    ['n','Трохи згодом…'],
    ['d','Бубос, люблю тебе.'],
    ['l','Люблю тебе, гівнюк.'],
    ['n','І з цього почалося все ❤️'],
  ],
  proposal: [
    ['d','Лєно…'],
  ],
  question: 'Будь моєю дружиною офіційно! 💍',
  yes1: 'ТАК ❤️',
  yes2: 'ЗВИЧАЙНО, ТАК! 💍',
  saidYes: 'ВОНА СКАЗАЛА «ТАК»! 💍',
  finalDate: '💍 13.07.2026 · пляж Отрада, Одеса',
};

/* ---------- базові речі ---------- */
const TILE=16;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const hudEl=$('hud'), dlg=$('dialog'), dwho=$('dwho'), dtext=$('dtext'),
      cardEl=$('card'), toastEl=$('toast'), fader=$('fader'),
      stickBase=$('stickBase'), stickKnob=$('stickKnob');
let W=0,H=0,Z=3;
function resize(){
  W=cv.width=innerWidth; H=cv.height=innerHeight;
  Z=Math.max(2,Math.floor(Math.min(W/(TILE*22),H/(TILE*14))));
  ctx.imageSmoothingEnabled=false;
}
addEventListener('resize',resize); resize();

const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const overlap=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
function mkCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}

/* ---------- звук (WebAudio, без файлів) ---------- */
let AC=null, muted=false;
function initAudio(){ if(AC) return; try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
function tone(f,d=0.08,type='square',v=0.045,when=0){
  if(!AC||muted) return;
  const t=AC.currentTime+when, o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+d+0.03);
}
const sfxBlip =()=>tone(700,0.05,'square',0.03);
const sfxStep =()=>{};
const sfxOk   =()=>[523,659,784].forEach((f,i)=>tone(f,0.09,'square',0.05,i*0.09));
const sfxTada =()=>[523,659,784,1046,1318].forEach((f,i)=>tone(f,0.14,'triangle',0.06,i*0.1));
const sfxLove =()=>[880,1046,1318].forEach((f,i)=>tone(f,0.12,'sine',0.05,i*0.07));
$('mute').addEventListener('click',()=>{muted=!muted;$('mute').textContent=muted?'🔇':'🔊';});

/* ---------- спрайти людей (малюємо пікселями) ---------- */
function flipCanvas(c){
  const n=mkCanvas(c.width,c.height), g=n.getContext('2d');
  g.translate(c.width,0); g.scale(-1,1); g.drawImage(c,0,0); return n;
}
function P_(g,x,y,w,h,col){ g.fillStyle=col; g.fillRect(x,y,w,h); }

// dir: 0 вниз(обличчям), 1 вліво, 2 вправо, 3 вгору(спиною); f: 0/1 крок
function renderPerson(o,dir,f){
  if(dir===1) return flipCanvas(renderPerson(o,2,f));
  const kid=!!o.kid, w=kid?12:14, h=kid?15:20;
  const c=mkCanvas(w,h), g=c.getContext('2d');
  const SK=o.skin, HA=o.hair, TP=o.top;
  const eye=o.eye||'#241d1a', shoe='#3a2f28';
  if(kid){
    // хвостики
    P_(g,0,3,2,4,HA); P_(g,10,3,2,4,HA);
    // голова
    P_(g,2,0,8,7,SK);
    P_(g,2,0,8,2,HA);                       // волосся зверху
    if(dir===3){ P_(g,2,0,8,6,HA); }        // спина — волосся
    else if(dir===0){ P_(g,4,3,1,1,eye); P_(g,7,3,1,1,eye); }
    else { P_(g,8,3,1,1,eye); P_(g,2,2,1,1,HA); }
    // сукня
    P_(g,3,7,6,4,TP); P_(g,2,10,8,3,TP);
    // ручки
    P_(g,2,7,1,3,SK); P_(g,9,7,1,3,SK);
    // ніжки
    const lo=f?-1:0, ro=f?0:-1;
    P_(g,4,13+lo,2,2-lo,SK); P_(g,7,13+ro,2,2-ro,SK);
    P_(g,4,14,2,1,shoe); P_(g,7,14,2,1,shoe);
  } else {
    const dress=!!o.dress, PN=o.pants||'#31415e';
    // довге волосся ззаду
    if(o.longHair){ P_(g,2,6,2,6,HA); P_(g,10,6,2,6,HA); }
    // голова
    P_(g,3,1,8,7,SK);
    P_(g,3,0,8,3,HA); P_(g,2,1,1,5,HA); P_(g,11,1,1,5,HA);
    if(dir===3){ P_(g,3,1,8,7,HA); }
    else if(dir===0){ P_(g,5,4,1,1,eye); P_(g,8,4,1,1,eye); }
    else { P_(g,9,4,1,1,eye); }
    // тулуб
    if(dress){ const BT=o.bottom||TP; P_(g,3,8,8,4,TP); P_(g,2,12,10,3,BT); }
    else { P_(g,3,8,8,6,TP); P_(g,4,14,6,2,PN); }
    // руки
    const ao=(f?1:0);
    P_(g,2,8+ao,1,4,TP); P_(g,11,8+(1-ao),1,4,TP);
    P_(g,2,12+ao,1,2,SK); P_(g,11,12,1,2,SK);
    // ноги
    const lo=f?-1:0, ro=f?0:-1;
    if(dress){
      P_(g,4,15+lo,2,3-lo,SK); P_(g,8,15+ro,2,3-ro,SK);
    } else {
      P_(g,4,15+lo,2,3-lo,PN); P_(g,8,15+ro,2,3-ro,PN);
    }
    P_(g,4,18,2,2,shoe); P_(g,8,18,2,2,shoe);
  }
  return c;
}
// Діма на коліні з каблучкою (обличчям вліво; для вправо — дзеркало)
function renderKneel(o,dir){
  const c=mkCanvas(18,20), g=c.getContext('2d');
  const SK=o.skin, HA=o.hair, TP=o.top, PN=o.pants||'#31415e';
  // голова
  P_(g,6,3,8,7,SK); P_(g,6,2,8,3,HA); P_(g,5,3,1,5,HA); P_(g,14,3,1,5,HA);
  P_(g,7,6,1,1,o.eye||'#241d1a'); // око вліво
  // тулуб
  P_(g,6,10,8,6,TP);
  // простягнута рука з каблучкою
  P_(g,2,11,5,2,TP); P_(g,1,11,2,2,SK);
  P_(g,0,9,2,2,'#f7c94b');           // каблучка
  P_(g,0,7,1,1,'#ffffff');           // блиск
  // ноги: одна на коліні
  P_(g,6,16,4,4,PN);                 // коліно на землі
  P_(g,11,15,3,3,PN); P_(g,11,18,3,2,'#3a2f28'); // друга нога
  return dir===2?flipCanvas(c):c;
}
function bakePerson(o){
  const d={};
  for(let dir=0;dir<4;dir++){ d[dir]=[renderPerson(o,dir,0),renderPerson(o,dir,1)]; }
  return d;
}
const SP_KID = bakePerson({kid:true, skin:CFG.colors.skin, hair:CFG.colors.herHair, top:CFG.colors.herDressKid});
const SP_HER = bakePerson({skin:CFG.colors.skin, hair:CFG.colors.herHair, top:CFG.colors.herTop, bottom:CFG.colors.herSkirt, dress:true, longHair:true});
const SP_HIM = bakePerson({skin:CFG.colors.skin, hair:CFG.colors.himHair, top:CFG.colors.himShirt, pants:CFG.colors.himPants, eye:CFG.colors.himEyes});
const SP_HIM_KNEEL_L = renderKneel({skin:CFG.colors.skin,hair:CFG.colors.himHair,top:CFG.colors.himShirt,pants:CFG.colors.himPants,eye:CFG.colors.himEyes},1);

/* ---------- тайли ---------- */
const SOLID=new Set(['#','~','f','R']);
const hashT=(i,j)=>((i*7349+j*9151)>>>0)%97;

function drawTileAt(t,i,j,time){
  const x=i*TILE, y=j*TILE, n=hashT(i,j);
  switch(t){
    case '.': {
      ctx.fillStyle='#5f9e4c'; ctx.fillRect(x,y,16,16);
      ctx.fillStyle='#548f44';
      if(n%3===0) ctx.fillRect(x+(n%13),y+(n%11),2,1);
      if(n%4===0) ctx.fillRect(x+((n*3)%13),y+((n*5)%13),1,2);
      if(n%23===0){ // квіточка
        const cols=['#f5f0f8','#f2c14e','#e0709a'];
        ctx.fillStyle=cols[n%3]; ctx.fillRect(x+5,y+6,2,2);
        ctx.fillStyle='#3f7a35'; ctx.fillRect(x+6,y+8,1,3);
      }
      break;
    }
    case '=': {
      ctx.fillStyle='#c9a36a'; ctx.fillRect(x,y,16,16);
      ctx.fillStyle='#b48f57';
      if(n%3===0) ctx.fillRect(x+(n%12),y+(n%9),2,2);
      if(n%5===0) ctx.fillRect(x+((n*7)%12),y+((n*3)%12),2,1);
      break;
    }
    case '-': {
      ctx.fillStyle='#6e6e78'; ctx.fillRect(x,y,16,16);
      ctx.fillStyle='#61616b';
      if(n%3===0) ctx.fillRect(x+(n%12),y+(n%12),2,1);
      ctx.fillStyle='#7d7d88';
      if(n%6===0) ctx.fillRect(x+((n*3)%12),y+((n*5)%12),1,1);
      break;
    }
    case '~': {
      ctx.fillStyle='#3f7fc1'; ctx.fillRect(x,y,16,16);
      const ph=(i+j*2+Math.floor(time*2))%5;
      if(ph===0){ ctx.fillStyle='#5a9ad8'; ctx.fillRect(x+3,y+7,7,2); }
      if(ph===2){ ctx.fillStyle='#356fae'; ctx.fillRect(x+8,y+3,5,2); }
      break;
    }
    case 's': {
      ctx.fillStyle='#e8d59a'; ctx.fillRect(x,y,16,16);
      ctx.fillStyle='#d9c383';
      if(n%3===0) ctx.fillRect(x+(n%13),y+(n%13),2,1);
      if(n%7===0) ctx.fillRect(x+((n*5)%13),y+((n*3)%13),1,1);
      break;
    }
    case '#': {
      ctx.fillStyle='#5f9e4c'; ctx.fillRect(x,y,16,16);
      ctx.fillStyle='#7a4a2b'; ctx.fillRect(x+6,y+9,4,6);
      ctx.fillStyle='#2f6b33';
      ctx.fillRect(x+1,y+2,14,9); ctx.fillRect(x+3,y,10,3); ctx.fillRect(x+3,y+10,10,2);
      ctx.fillStyle='#3f8a43';
      ctx.fillRect(x+3,y+2,7,4); ctx.fillRect(x+5,y+7,5,2);
      break;
    }
    case 'f': {
      ctx.fillStyle='#5f9e4c'; ctx.fillRect(x,y,16,16);
      ctx.fillStyle='#a87848'; ctx.fillRect(x,y+6,16,3);
      ctx.fillStyle='#8f6039'; ctx.fillRect(x+2,y+4,3,9); ctx.fillRect(x+11,y+4,3,9);
      break;
    }
    case 'R': {
      ctx.fillStyle='#57503f'; ctx.fillRect(x,y,16,16);
      ctx.fillStyle='#3b3428';
      ctx.fillRect(x+1,y+2,3,12); ctx.fillRect(x+6,y+2,3,12); ctx.fillRect(x+11,y+2,3,12);
      ctx.fillStyle='#b8bdc9';
      ctx.fillRect(x,y+4,16,2); ctx.fillRect(x,y+10,16,2);
      break;
    }
  }
}

/* ---------- будівлі та пропси ---------- */
function drawBuilding(b){
  const X=b.x*TILE, Y=b.y*TILE, Wd=b.w*TILE, Ht=b.h*TILE;
  const roofH=Math.max(10,(Ht*0.4)|0);
  // стіна
  ctx.fillStyle=b.wall; ctx.fillRect(X,Y+roofH,Wd,Ht-roofH);
  // вікна
  ctx.fillStyle='#bfe3f2';
  const doorPx=b.doorX*TILE;
  for(let wy=Y+roofH+3; wy<=Y+Ht-12; wy+=10){
    for(let wx=X+4; wx<=X+Wd-10; wx+=10){
      if(wy>Y+Ht-16 && wx>doorPx-8 && wx<doorPx+14) continue;
      ctx.fillRect(wx,wy,6,6);
      ctx.fillStyle='#8fb9cc'; ctx.fillRect(wx,wy+3,6,1); ctx.fillStyle='#bfe3f2';
    }
  }
  // двері
  ctx.fillStyle='#6b4326'; ctx.fillRect(doorPx+4,Y+Ht-11,8,11);
  ctx.fillStyle='#f2c14e'; ctx.fillRect(doorPx+10,Y+Ht-6,1,2);
  // дах

/* ---------- карти ---------- */
function mkGrid(w,h){return Array.from({length:h},()=>Array(w).fill('.'));}
function FR(g,x,y,w,h,c){for(let j=y;j<y+h;j++){if(!g[j])continue;for(let i=x;i<x+w;i++){if(g[j][i]!==undefined)g[j][i]=c;}}}
function outlineG(g,c){const w=g[0].length,h=g.length;FR(g,0,0,w,1,c);FR(g,0,h-1,w,1,c);FR(g,0,0,1,h,c);FR(g,w-1,0,1,h,c);}
function Bd(m,id,x,y,w,h,label,wall,roof,doorKind){
  const b={id,x,y,w,h,label,wall,roof,doorX:x+Math.floor(w/2)};
  m.buildings.push(b);
  m.zones.push({id,kind:doorKind||'door',x:b.doorX,y:y+h,w:1,h:1,wasIn:false});
  return b;
}
function Zn(m,id,kind,x,y,w,h,label){ m.zones.push({id,kind,x,y,w,h,label,wasIn:false}); }
function Pr(m,type,x,y){ m.props.push({type,x,y}); }

const MAPS={};
function makeMap(id,name,w,h,bg,build){
  const m={id,name,w,h,g:mkGrid(w,h),buildings:[],zones:[],props:[],bg,solids:[]};
  build(m.g,m); MAPS[id]=m; return m;
}

function tileAt(px,py){
  const i=Math.floor(px/TILE), j=Math.floor(py/TILE);
  const row=G.map.g[j]; if(!row) return '#';
  const t=row[i]; return t===undefined?'#':t;
}
function solidPoint(px,py){
  if(SOLID.has(tileAt(px,py))) return true;
  for(const b of G.map.buildings){
    if(px>=b.x*TILE&&px<(b.x+b.w)*TILE&&py>=b.y*TILE&&py<(b.y+b.h)*TILE) return true;
  }
  for(const s of G.map.solids){
    if(px>=s.x&&px<s.x+s.w&&py>=s.y&&py<s.y+s.h) return true;
  }
  return false;
}
function canStand(x,y){
  return !(solidPoint(x-5,y-6)||solidPoint(x+4,y-6)||solidPoint(x-5,y-1)||solidPoint(x+4,y-1));
}
const zoneRectPx=z=>({x:z.x*TILE,y:z.y*TILE,w:z.w*TILE,h:z.h*TILE});
const pRect=()=>({x:P.x-5,y:P.y-6,w:10,h:7});

function stepActor(a,dt){
  if(!a._mv) return;
  const m=a._mv, dx=m.tx-a.x, dy=m.ty-a.y, dist=Math.hypot(dx,dy), step=m.speed*dt;
  if(dist<=step){ a.x=m.tx; a.y=m.ty; a.moving=false; const r=m.res; a._mv=null; r(); }
  else { a.x+=dx/dist*step; a.y+=dy/dist*step; a.moving=true; a.animT+=dt;
    a.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?2:1):(dy>0?0:3); }
}
const moveActor=(a,tx,ty,speed)=>new Promise(res=>{a._mv={tx,ty,speed:speed||55,res};});

  if(!dState) return false;
  if(!dState.done){ clearInterval(dState.tm); dtext.textContent=dState.full; dState.done=true; sfxBlip(); return true; }

}

/* ---------- сердечка ---------- */
let hearts=[];
function spawnHearts(x,y,n,spread){
  spread=spread||30;
  for(let k=0;k<n;k++) hearts.push({
    x:x+(Math.random()-0.5)*spread, y:y+(Math.random()-0.5)*14,
    vy:-(14+Math.random()*28), life:1.6+Math.random()*1.5, t:0,
    s:Math.random()<0.3?2:1, col:['#ff5d8f','#ff2e63','#f7c94b'][k%3] });
}
function updHearts(dt){ hearts=hearts.filter(h=>{ h.t+=dt; h.y+=h.vy*dt; h.x+=Math.sin(h.t*5+h.vy)*9*dt; return h.t<h.life; }); }
const HEART=['.##.##.','#######','#######','.#####.','..###..','...#...'];
function drawHearts(){
  for(const h of hearts){
    ctx.globalAlpha=clamp(1-h.t/h.life,0,1); ctx.fillStyle=h.col;
    for(let r=0;r<6;r++) for(let q=0;q<7;q++)
      if(HEART[r][q]==='#') ctx.fillRect(h.x+(q-3)*h.s,h.y+r*h.s,h.s,h.s);
  }
  ctx.globalAlpha=1;
}

async function onZone(z){
  if(G.busy) return;
  const id=z.id, s=G.stage;
  if(z.kind==='deco'){ toast(decoLine(id)); return; }
  if(id==='home'){ toast('Рідна хата ❤️'); return; }
  if(id==='dorm'){ toast('Гуртожиток. Сусідки ще сплять 😴'); return; }
  if(id==='homeV'){ toast(decoLine(id)); return; }

  // 1. Садочок ×2
  if(s===1){
    if(id==='sadok'){ G.busy=true; G.c++; sfxOk();
      if(G.c<2) await dayCycle('🧸 Садочок · '+G.c+'/2 ✓',null,5,12);
      else {
        await dayCycle('🧸 Садочок пройдено ✓',null,5,12);
        await sayAll([['n','Садочок позаду! 🧸'],['n','Тепер — школа. Аж дев\'ять класів 🎒']]);
        G.stage=2; G.c=0;
      }
      refreshObj(); G.busy=false; return; }
    if(id==='school'){ toast('Спочатку — садочок 🙂'); return; }
    if(z.kind==='exit'){ toast('Ще зарано 🙂'); return; }
  }

  // 2. Школа 1–9
  if(s===2){
    if(id==='school'){ G.busy=true; G.c++; sfxOk();
      if(G.c<9) await dayCycle('🎒 '+G.c+' клас ✓',null,5,12);
      else {
        await dayCycle('🎒 9 клас ✓',null,5,12);
        await showCard('Лєна виросла ✨',1600); G.adult=true; sfxTada();
        await sayAll([['n','Дев\'ять класів позаду!'],['n','Попереду — ліцей у Хмельницькому. Автобус чекає на зупинці біля дороги ⬆️']]);
        G.stage=3; G.sub='go';
      }
      refreshObj(); G.busy=false; return; }
    if(id==='sadok'){ toast('У садочок уже не треба 🙂'); return; }
    if(z.kind==='exit'){ toast('Спершу — школа 🎒'); return; }
  }

  // 3. Ліцей у Хмельницькому (туди й назад)
  if(s===3){
    if(id==='busZhyl'&&G.sub==='go'){ G.busy=true;
      await travel('khm',6,11,'🚌 Жилинці → Хмельницький');

    if(id==='liceum'){ if(G.sub!=='go'){ toast('Ліцей уже відвідано ✔️'); return; }
      G.busy=true; sfxOk();
      await say('n','Ліцей відвідано ✔️ Але серце тягне додому…');
      G.sub='back'; refreshObj(); G.busy=false; return; }
    if(id==='busKhm'){ if(G.sub!=='back'){ toast('Спершу — до ліцею 🏛'); return; }
      G.busy=true;
      await travel('zhyl',16,4,'🚌 Хмельницький → Жилинці');
      await sayAll([['n','Вдома найкраще ❤️'],['n','10 та 11 клас Лєна ходитиме до школи в сусідній Правдівці. Стежка — на схід ➡️']]);
      G.stage=4; G.c=0; refreshObj(); G.busy=false; return; }
    if(id==='school'||id==='sadok'){ toast('Тепер твій шлях далі 🙂'); return; }
    if(id==='toPrav'){ toast('Спершу — Хмельницький 🚌'); return; }
  }

  // 4. Правдівка: 10–11 клас
  if(s===4){
    if(id==='toPrav'){ G.busy=true; await travel('prav',2,7,'🚶 Стежкою до Правдівки'); G.busy=false; return; }
    if(id==='toZhyl'){ G.busy=true; await travel('zhyl',29,12,null); G.busy=false; return; }
    if(id==='schoolPrav'){ G.busy=true; G.c++; sfxOk();
      if(G.c===1) await dayCycle('📚 10 клас ✓','zhyl',5,12);
      else {
        await dayCycle('📚 11 клас ✓','zhyl',5,12);
        await showCard('🎉 ШКОЛУ ЗАКІНЧЕНО!',1800); sfxTada();
        await sayAll([['n','Випускний, атестат, великі мрії…'],['n','Вінниця кличе: вступ до ВТЕІ! 🚌 Мерщій на зупинку!']]);
        G.stage=5; G.sub='bus';
      }
      refreshObj(); G.busy=false; return; }
    if(id==='busZhyl'){ toast('Спершу — школа в Правдівці 📚'); return; }
    if(id==='school'||id==='sadok'){ toast('Це вже пройдений етап 🙂'); return; }
  }

  // 5. ВТЕІ: 3 курси
  if(s===5){
    if(id==='busZhyl'&&G.sub==='bus'){ G.busy=true;
      await travel('vin1',5,11,'🚌 Жилинці → Вінниця 🌻');
      await sayAll([['n','Вітаємо у Вінниці! Он і ВТЕІ 🎓'],['n','А твій новий дім — гуртожиток.']]);
      G.sub='study'; G.c=0; refreshObj(); G.busy=false; return; }
    if(id==='toPrav'||id==='school'||id==='sadok'){ toast('Тепер твій шлях — у Вінницю 🚌'); return; }
    if(id==='vtei'){ G.busy=true; G.c++; sfxOk();
      if(G.c<3) await dayCycle('🎓 '+G.c+' курс складено!',null,5,11);
      else {
        await dayCycle('🎓 3 курс складено!',null,5,11);
        await sayAll([['n','Три курси позаду. Починається четвертий…'],['n','Звичайний день. Звичайна дорога на пари. Чи ні? 😉']]);
        G.stage=6;
        D.visible=true; D.kneel=false; D.x=13*TILE+8; D.y=10*TILE+10; D.dir=1;
      }
      refreshObj(); G.busy=false; return; }
  }

  // 6. Зустріч із Дімою
  if(s===6&&(id==='meet'||id==='vtei')){ await meetScene(); return; }

  // 7. Вишенька: робота ×2
  if(s===7){
    if(id==='work'){ G.busy=true; G.c++; sfxOk();
      if(G.c===1) await dayCycle('💼 Рік перший: перша спільна зарплата ✓',null,5,10);
      else {
        await dayCycle('☕ Рік другий: робота, дім і затишні вечори ✓',null,5,10);
        await sayAll([['d','Лєно, є ідея! Переїжджаємо ближче до вокзалу?'],['l','Давай! 📦']]);
        await travel('zal',8,13,'🚚 Вишенька → район вокзалу');
        await say('n','Нова квартира — і три спокійні, щасливі роки.');
        G.stage=8; G.c=0;
      }
      refreshObj(); G.busy=false; return; }
  }

  // 8. Біля вокзалу: 3 роки
  if(s===8){
    if(id==='workZ'){ G.busy=true; G.c++; sfxOk();
      const cards=['🌸 Рік перший у новій квартирі ✓','❄️ Рік другий ✓','☀️ Рік третій ✓'];
      await dayCycle(cards[G.c-1],null,8,13);
      if(G.c>=3){
        await sayAll([['d','Лєно… а гайда до моря? В Одесу! 🌊'],['l','ТАК! Коли їдемо? 😍'],['n','Квитки куплено: 11 липня 2026, потяг до Одеси 🎫 Йдіть на вокзал!']]);
        G.stage=9;
      }
      refreshObj(); G.busy=false; return; }
    if(id==='vokzal'){ toast('Потяг ще не сьогодні 🙂'); return; }
  }

  // 9. Потяг до Одеси
  if(s===9){
    if(id==='vokzal'){ G.busy=true;
      await travel('odesa',2,3,'🚆 11.07.2026<br>Вінниця → Одеса');
      await sayAll([['n','Одеса! Сонце, чайки і море 🌊'],['n','Прогуляйтеся вдвох до Жовтого каменя на пляжі Отрада 💛']]);
      G.stage=10; refreshObj(); G.busy=false; return; }
    if(id==='workZ'){ toast('Сьогодні не до роботи — валізи! 🧳'); return; }
  }

  // 10. Жовтий камінь
  if(s===10&&id==='stone'){ await proposalScene(); return; }

  if(z.kind==='door') toast('Зачинено 🙂');
  else if(z.kind==='exit') toast('Не зараз 🙂');
}

async function meetScene(){
  G.busy=true;
  D.visible=true; D.kneel=false;
  await moveActor(D,P.x+20,P.y,72);
  D.dir=1; P.dir=2;
  spawnHearts((P.x+D.x)/2,P.y-24,6,20); sfxLove();
  await sayAll(CFG.meet);
  spawnHearts((P.x+D.x)/2,P.y-24,16,28); sfxLove();
  await showCard('❤️',1000);
  await say('n','Далі все закрутилось: побачення, прогулянки… І ось вони вже разом винаймають квартиру на Вишеньці!');
  G.follower=true;
  await travel('vysh',5,10,'📦 Переїзд на Вишеньку');
  await say('n','Доросле життя: разом на роботу, разом додому 🏠');
  G.stage=7; G.c=0; refreshObj(); G.busy=false;
}

async function proposalScene(){
  G.busy=true; G.stage=11; setObj(''); G.target=null;
  await showCard('☀️ 12 липня — цілий день моря, сонця і морозива',2000);
  await fadeOut();
  G.sunset=true;
  P.x=22*TILE+10; P.y=12*TILE+10; P.dir=2; P._mv=null;
  D.visible=true; D.kneel=false; D._mv=null; D.x=P.x-44; D.y=P.y+2;
  trail=[]; camSnapNow();
  await showCard('🌇 13 липня 2026 · вечір',2000);
  await fadeIn();
  await moveActor(D,P.x+28,P.y,44);
  D.dir=1; P.dir=2;
  await wait(500);
  await sayAll(CFG.proposal);
  D.kneel=true; sfxLove();
  spawnHearts(P.x+14,P.y-26,10,32);
  const drip=setInterval(()=>spawnHearts(P.x+14,P.y-32,2,46),550);
  await wait(750);
  document.getElementById('qt').textContent=CFG.question;
  document.getElementById('yes1').textContent=CFG.yes1;
  document.getElementById('yes2').textContent=CFG.yes2;
  document.getElementById('ask').style.display='flex';
  await new Promise(res=>{
    const h=()=>{ document.getElementById('ask').style.display='none'; res(); };
    document.getElementById('yes1').onclick=h;
    document.getElementById('yes2').onclick=h;
  });
  clearInterval(drip);
  sfxTada();
  spawnHearts(P.x+14,P.y-18,90,100);
  await wait(1000);
  await showCard(CFG.saidYes,2400);
  document.getElementById('finDate').textContent=CFG.finalDate;
  document.getElementById('final').style.display='flex';
}

/* ---------- старт ---------- */
async function startGame(){
  initAudio();
  document.getElementById('title').style.display='none';
  document.getElementById('mute').style.display='flex';
  G.map=MAPS.zhyl; spawnAt(5,12);
  await fadeIn();
  await showCard('с. Жилинці · початок історії',1700);
  await sayAll([
    ['n','Десь на Хмельниччині є село Жилинці.'],
    ['n','Тут росте дівчинка на ім\'я Лєна 👧'],
    ['n','Пройди її шлях крок за кроком — він приведе далі, ніж здається ❤️'],
    ['n','Керування: тягни палець по екрану (джойстик) або стрілки/WASD. Іди туди, куди вказує жовта стрілочка!'],
  ]);
  G.stage=1; G.c=0; refreshObj(); G.busy=false;
}
document.getElementById('startBtn').addEventListener('click',startGame);

/* ---------- керування ---------- */
const keys={};
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(k===' '||k==='enter'||k==='e'){ if(advanceDialog()) return; }
  keys[k]=true;
});
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

const joy={active:false,id:null,ox:0,oy:0,dx:0,dy:0};
addEventListener('pointerdown',e=>{
  if(e.target.closest('button')||e.target.closest('#mute')) return;
  initAudio();
  if(dState){ advanceDialog(); return; }
  if(G.busy) return;
  joy.active=true; joy.id=e.pointerId; joy.ox=e.clientX; joy.oy=e.clientY; joy.dx=0; joy.dy=0;
  stickBase.style.display='block';
  stickBase.style.left=(e.clientX-49)+'px';
  stickBase.style.top=(e.clientY-49)+'px';
  stickKnob.style.transform='translate(0,0)';
});
addEventListener('pointermove',e=>{
  if(!joy.active||e.pointerId!==joy.id) return;
  let dx=e.clientX-joy.ox, dy=e.clientY-joy.oy;
  const d=Math.hypot(dx,dy), max=40;
  if(d>max){ dx=dx/d*max; dy=dy/d*max; }
  joy.dx=dx/max; joy.dy=dy/max;
  stickKnob.style.transform='translate('+dx+'px,'+dy+'px)';
});
function joyEnd(e){ if(e.pointerId!==joy.id) return; joy.active=false; joy.dx=0; joy.dy=0; stickBase.style.display='none'; }
addEventListener('pointerup',joyEnd);
addEventListener('pointercancel',joyEnd);
addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

/* ---------- оновлення ---------- */
function update(dt){
  G.time+=dt;
  stepActor(P,dt); stepActor(D,dt);
  updHearts(dt);
  if(!G.busy&&G.stage>0&&!dState){
    let vx=0,vy=0;
    if(keys['arrowleft']||keys['a']) vx-=1;
    if(keys['arrowright']||keys['d']) vx+=1;
    if(keys['arrowup']||keys['w']) vy-=1;
    if(keys['arrowdown']||keys['s']) vy+=1;
    if(joy.active){
      vx=Math.abs(joy.dx)>0.2?joy.dx:0;
      vy=Math.abs(joy.dy)>0.2?joy.dy:0;
    }
    const l=Math.hypot(vx,vy);
    if(l>0.05){
      vx/=Math.max(1,l); vy/=Math.max(1,l);
      const sp=(G.adult?80:64)*dt;
      const nx=P.x+vx*sp;
      if(canStand(nx,P.y)) P.x=nx;
      const ny=P.y+vy*sp;
      if(canStand(P.x,ny)) P.y=ny;
      const mw=G.map.w*TILE, mh=G.map.h*TILE;
      P.x=clamp(P.x,6,mw-6); P.y=clamp(P.y,8,mh-2);
      P.moving=true; P.animT+=dt;
      if(Math.abs(vx)>Math.abs(vy)) P.dir=vx>0?2:1; else if(Math.abs(vy)>0) P.dir=vy>0?0:3;
      trail.push({x:P.x,y:P.y});
      if(trail.length>60) trail.shift();
    } else P.moving=false;
    checkZones();
  }
  if(G.follower&&D.visible&&!D._mv&&!D.kneel){
    const tgt=trail.length>16?trail[trail.length-16]:null;
    if(tgt){
      const dx=tgt.x-D.x, dy=tgt.y-D.y, d=Math.hypot(dx,dy);
      if(d>3){
        const st=Math.min(86*dt,d);
        D.x+=dx/d*st; D.y+=dy/d*st;
        D.moving=true; D.animT+=dt;
        D.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?2:1):(dy>0?0:3);
      } else D.moving=false;
    } else D.moving=false;
  }
  if(G.map){
    const vw=W/Z, vh=H/Z, mw=G.map.w*TILE, mh=G.map.h*TILE;
    const tx=mw<=vw?-(vw-mw)/2:clamp(P.x-vw/2,0,mw-vw);
    const ty=mh<=vh?-(vh-mh)/2:clamp(P.y-vh/2,0,mh-vh);
    cam.x+=(tx-cam.x)*Math.min(1,dt*7);
    cam.y+=(ty-cam.y)*Math.min(1,dt*7);
  }
}
function checkZones(){
  const pr=pRect();
  for(const z of G.map.zones){
    const inz=overlap(pr,zoneRectPx(z));
    if(inz&&!z.wasIn){ z.wasIn=true; onZone(z); }
    else if(!inz) z.wasIn=false;
  }
}

/* ---------- рендер ---------- */
function drawActor(a){
  if(a===D&&D.kneel){
    ctx.drawImage(SP_HIM_KNEEL_L,Math.round(a.x-9),Math.round(a.y-19));
    return;
  }
  const set=(a===P)?(G.adult?SP_HER:SP_KID):SP_HIM;
  const f=a.moving?(Math.floor(a.animT*7)%2):0;
  const img=set[a.dir][f];
  ctx.drawImage(img,Math.round(a.x-img.width/2),Math.round(a.y-img.height+1));
}
function render(){
  const m=G.map;
  ctx.fillStyle=m?m.bg:'#101326';
  ctx.fillRect(0,0,W,H);
  if(!m) return;
  ctx.save(); ctx.scale(Z,Z); ctx.translate(-cam.x,-cam.y);
  const i0=Math.max(0,Math.floor(cam.x/TILE)), j0=Math.max(0,Math.floor(cam.y/TILE));
  const i1=Math.min(m.w-1,Math.ceil((cam.x+W/Z)/TILE)), j1=Math.min(m.h-1,Math.ceil((cam.y+H/Z)/TILE));
  for(let j=j0;j<=j1;j++) for(let i=i0;i<=i1;i++) drawTileAt(m.g[j][i],i,j,G.time);
  const items=[];
  for(const b of m.buildings) items.push({y:(b.y+b.h)*TILE,d:()=>drawBuilding(b)});
  for(const p of m.props) items.push({y:p.y*TILE+(p.type==='stone'?22:16),d:()=>drawProp(p,G.time)});
  if(D.visible) items.push({y:D.y,d:()=>drawActor(D)});
  items.push({y:P.y,d:()=>drawActor(P)});
  items.sort((a,b)=>a.y-b.y);
  for(const it of items) it.d();
  if(G.target&&G.target[0]===m.id){
    const z=m.zones.find(q=>q.id===G.target[1]);
    if(z){
      const ax=z.x*TILE+z.w*8, ay=z.y*TILE-6+Math.sin(G.time*5)*2.5;
      ctx.fillStyle='#f7c94b';
      ctx.beginPath(); ctx.moveTo(ax-5,ay-8); ctx.lineTo(ax+5,ay-8); ctx.lineTo(ax,ay); ctx.closePath(); ctx.fill();
    }
  }
  drawHearts();
  ctx.restore();
  ctx.font='bold 11px "Courier New",monospace'; ctx.textAlign='center';
  const lbl=(txt,wx,wy)=>{
    const sx=(wx-cam.x)*Z, sy=(wy-cam.y)*Z;
    if(sx<-80||sx>W+80||sy<-24||sy>H+24) return;
    ctx.lineWidth=3; ctx.strokeStyle='rgba(10,12,24,.85)';
    ctx.strokeText(txt,sx,sy); ctx.fillStyle='#fff'; ctx.fillText(txt,sx,sy);
  };
  for(const b of m.buildings) if(b.label) lbl(b.label,b.x*TILE+b.w*8,b.y*TILE-4);
  for(const z of m.zones) if(z.label) lbl(z.label,z.x*TILE+z.w*8,z.y*TILE-3);
  ctx.textAlign='left';
  ctx.strokeStyle='rgba(10,12,24,.85)'; ctx.lineWidth=3;
  ctx.strokeText(m.name,10,H-10);
  ctx.fillStyle='#cfd6ff'; ctx.fillText(m.name,10,H-10);
  if(G.sunset){
    const gr=ctx.createLinearGradient(0,0,0,H);
    gr.addColorStop(0,'rgba(255,110,40,.30)');
    gr.addColorStop(.6,'rgba(255,80,60,.16)');
    gr.addColorStop(1,'rgba(90,40,110,.22)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  }
}

let last=0;
function loop(ts){
  const dt=Math.min(0.05,(ts-last)/1000||0.016);
  last=ts;
  update(dt); render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
