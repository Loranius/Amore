<!doctype html>
<html lang="uk" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#171717" />

    <!-- iOS: standalone-режим (без Safari-хрому) + назва під іконкою
         на Home Screen. Статус-бар — default (не translucent): без
         відео-фону немає темного шару позаду, що гарантував контраст
         для світлого тексту статус-бару. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Amore" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <!-- Fredoka/Nunito — лише для «Pink Portal» екранів (Login/Home),
         решта застосунку лишається на системному шрифті. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Amore</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
