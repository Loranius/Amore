<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наш портал</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/components.css">
</head>
<body>

<!-- ===================== AUTH SCREEN ===================== -->
<div id="auth-screen" class="screen">
  <div class="auth-card">
    <p class="eyebrow">Привіт</p>
    <h1 class="display-xl">Хто заходить?</h1>

    <div id="user-select" class="user-select">
      <!-- кнопки користувачів рендеряться через auth.js -->
    </div>

    <div id="pin-pad" class="pin-pad hidden">
      <p class="pin-name" id="pin-name"></p>
      <div class="pin-dots" id="pin-dots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div class="pin-keys">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key ghost" data-key="back">Назад</button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key ghost" data-key="clear">⌫</button>
      </div>
      <p class="pin-error hidden" id="pin-error">Невірний PIN, спробуй ще</p>
    </div>
  </div>
</div>

<!-- ===================== MAIN APP ===================== -->
<div id="app" class="app hidden">

  <header class="topbar">
    <div class="topbar-inner">
      <span class="brand">Наш портал</span>
      <button class="logout-btn" id="logout-btn" title="Вийти">Вийти</button>
    </div>
  </header>

  <main class="content" id="content">
    <!-- ---------- Лічильник (головна) ---------- -->
    <section class="view" id="view-counter" data-view="counter">
      <div class="counter-card card">
        <p class="eyebrow" id="counter-since">з якогось дня</p>
        <div class="counter-number" id="counter-number">—</div>
        <p class="counter-label">днів разом</p>
        <svg class="pulse-line" viewBox="0 0 300 40" preserveAspectRatio="none" aria-hidden="true">
          <path d="M0,20 Q75,5 150,20 T300,20" />
        </svg>
      </div>
    </section>

    <!-- ---------- Календар ---------- -->
    <section class="view hidden" id="view-calendar" data-view="calendar">
      <div class="view-header">
        <h2 class="display-md">Календар</h2>
        <button class="btn-primary" id="add-event-btn">+ Подія</button>
      </div>
      <div class="card" id="calendar-list">
        <!-- список подій рендериться через calendar.js -->
      </div>
    </section>

    <!-- ---------- Wishlist ---------- -->
    <section class="view hidden" id="view-wishlist" data-view="wishlist">
      <div class="view-header">
        <h2 class="display-md">Wishlist</h2>
        <button class="btn-primary" id="add-wish-btn">+ Бажання</button>
      </div>
      <div class="wishlist-tabs" id="wishlist-tabs">
        <!-- вкладки "Моє" / "[Партнер]" рендеряться через wishlist.js -->
      </div>
      <div class="card-grid" id="wishlist-grid">
        <!-- картки бажань -->
      </div>
    </section>

    <!-- ---------- Бюджет ---------- -->
    <section class="view hidden" id="view-budget" data-view="budget">
      <div class="view-header">
        <h2 class="display-md">Бюджет</h2>
        <button class="btn-primary" id="add-expense-btn">+ Витрата</button>
      </div>

      <div class="card budget-summary">
        <div class="budget-month-nav">
          <button class="month-arrow" id="budget-prev-month">‹</button>
          <span class="budget-month-label" id="budget-month-label">—</span>
          <button class="month-arrow" id="budget-next-month">›</button>
        </div>
        <div class="budget-total" id="budget-total">0 ₴</div>
        <p class="budget-total-label">витрачено за місяць</p>
        <div class="budget-chart-wrap">
          <canvas id="budget-chart"></canvas>
        </div>
      </div>

      <div class="card" id="budget-list">
        <!-- список витрат -->
      </div>
    </section>

    <!-- ---------- Капсула часу ---------- -->
    <section class="view hidden" id="view-capsule" data-view="capsule">
      <div class="view-header">
        <h2 class="display-md">Капсула часу</h2>
        <button class="btn-primary" id="add-capsule-btn">+ Лист</button>
      </div>
      <div class="card-grid" id="capsule-grid">
        <!-- картки листів -->
      </div>
    </section>

    <!-- ---------- Питання дня ---------- -->
    <section class="view hidden" id="view-question" data-view="question">
      <div class="view-header">
        <h2 class="display-md">Питання дня</h2>
      </div>
      <div class="card question-card">
        <p class="eyebrow" id="question-date">—</p>
        <p class="question-text" id="question-text">Завантаження…</p>

        <div class="question-answers" id="question-answers">
          <!-- відповіді обох -->
        </div>

        <div class="form-field hidden" id="question-input-wrap">
          <label for="question-input">Твоя відповідь</label>
          <textarea id="question-input" rows="3" placeholder="Напиши відповідь..."></textarea>
          <button class="btn-primary" id="question-save" style="margin-top: var(--space-2); align-self: flex-start;">Зберегти</button>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" data-view="counter">
      <span class="nav-icon">●</span>
      <span class="nav-label">Разом</span>
    </button>
    <button class="nav-btn" data-view="calendar">
      <span class="nav-icon">▤</span>
      <span class="nav-label">Календар</span>
    </button>
    <button class="nav-btn" data-view="wishlist">
      <span class="nav-icon">♡</span>
      <span class="nav-label">Wishlist</span>
    </button>
    <button class="nav-btn" data-view="budget">
      <span class="nav-icon">₴</span>
      <span class="nav-label">Бюджет</span>
    </button>
    <button class="nav-btn" data-view="capsule">
      <span class="nav-icon">✉</span>
      <span class="nav-label">Капсула</span>
    </button>
    <button class="nav-btn" data-view="question">
      <span class="nav-icon">?</span>
      <span class="nav-label">Питання</span>
    </button>
  </nav>

</div>

<!-- ===================== MODAL ROOT ===================== -->
<div id="modal-root"></div>

<!-- ===================== SCRIPTS ===================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="lib/supabase.js"></script>
<script src="modules/auth.js"></script>
<script src="modules/router.js"></script>
<script src="modules/counter.js"></script>
<script src="modules/calendar.js"></script>
<script src="modules/wishlist.js"></script>
<script src="modules/budget.js"></script>
<script src="modules/capsule.js"></script>
<script src="modules/question.js"></script>
<script src="modules/app.js"></script>
</body>
</html>
